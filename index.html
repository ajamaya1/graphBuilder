})();

// minimal SSE reader for streaming responses — yields parsed JSON from each `data:` line
async function* sseEvents(resp) {
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    let nl;
    while ((nl = buf.indexOf("\n")) >= 0) {
      const line = buf.slice(0, nl).trim();
      buf = buf.slice(nl + 1);
      if (line.startsWith("data:")) {
        const payload = line.slice(5).trim();
        if (payload && payload !== "[DONE]") { try { yield JSON.parse(payload); } catch {} }
      }
    }
  }
}

function getPathIndex(version) {
  if (typeof window === "undefined" || !window.GRAPH_PATHS) return null;
  if (!window.__gpParsed) {
    const parse = (s) =>
      s.split("\n").map((l) => {
        const i = l.lastIndexOf("~");
        return [l.slice(0, i), l.slice(i + 1)];
      });
    window.__gpParsed = { v1: parse(window.GRAPH_PATHS.v1), beta: parse(window.GRAPH_PATHS.beta) };
  }
  return window.__gpParsed[version === "beta" ? "beta" : "v1"];
}

// ── helpers ──────────────────────────────────────────────────
function clauseToOData(c, res) {
  const raw = (c.val ?? "").trim();
  const isNull = raw.toLowerCase() === "null";       // literal null → unquoted (e.g. department eq null)
  const isBool = res?.bools?.includes(c.prop);
  const isNum = /^-?\d+$/.test(raw) && !isBool;
  const v = isNull ? "null" : (isBool || isNum ? raw : `'${raw.replace(/'/g, "''")}'`);
  // startswith/contains take a string arg; null isn't valid there, fall through to plain comparison
  if ((c.op === "startswith" || c.op === "contains") && !isNull) return `${c.op}(${c.prop},${v})`;
  return `${c.prop} ${c.op} ${v}`;
}

// A custom path can take an appended /{id} only if it's a bare collection — not a function/$ref,
// an action verb (.../{id}/syncDevice), or a path that already contains an explicit id segment.
function pathAcceptsAppendedId(p) {
  const segs = (p || "").split("/").filter(Boolean);
  if (segs.length <= 1) return true;
  const last = segs[segs.length - 1];
  if (/[()$]/.test(last)) return false; // function call, $ref, $count, $value …
  const idLike = (s) => /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s) || /-?id$/i.test(s);
  if (/^[a-z]/.test(last) && idLike(segs[segs.length - 2] || "")) return false; // .../{id}/actionVerb
  if (segs.some(idLike)) return false; // already targets a specific item
  return true;
}

function buildQuery(params, res, consistency) {
  const parts = [];
  for (const p of params) {
    if (p.type === "select" && p.props.length) parts.push(`$select=${p.props.join(",")}`);
    if (p.type === "filter" && p.clauses.some((c) => c.prop && c.val !== "")) {
      const f = p.clauses.filter((c) => c.prop && c.val !== "").map((c) => clauseToOData(c, res)).join(` ${p.join} `);
      if (f) parts.push(`$filter=${f}`);
    }
    if (p.type === "top" && p.value) parts.push(`$top=${p.value}`);
    if (p.type === "orderby" && p.prop) parts.push(`$orderby=${p.prop} ${p.dir}`);
    if (p.type === "count") parts.push(`$count=true`);
    if (p.type === "expand" && p.value) parts.push(`$expand=${p.value}`);
  }
  if (consistency && !parts.includes("$count=true")) parts.push("$count=true");
  return parts.length ? "?" + parts.join("&") : "";
}

function needsConsistency(params, res) {
  if (!res?.dir) return false;
  const hasFilter = params.some((p) => p.type === "filter" && p.clauses?.some((c) => c.prop && c.val !== ""));
  const hasOrderby = params.some((p) => p.type === "orderby" && p.prop);
  const hasExpand = params.some((p) => p.type === "expand" && p.value);
  const hasCount = params.some((p) => p.type === "count");
  // advanced operators (ne, contains, …) and null comparisons always require the advanced-query mode
  const advFilter = params.some((p) => p.type === "filter" && p.clauses?.some((c) => c.prop && c.val !== "" && (OPS.find((o) => o.id === c.op)?.adv || (c.val || "").trim().toLowerCase() === "null")));
  if (advFilter) return true;
  // On directory objects, any of filter / orderby / expand / count puts the request into
  // advanced-query territory, which needs ConsistencyLevel:eventual + $count. Adding them is
  // harmless for the simple cases and required for the rest.
  return hasFilter || hasOrderby || hasExpand || hasCount;
}

function hexA(hex, a) {
  const h = hex.replace("#", "");
  const n = h.length === 3 ? h.split("").map((c) => c + c).join("") : h;
  const r = parseInt(n.slice(0, 2), 16), g = parseInt(n.slice(2, 4), 16), b = parseInt(n.slice(4, 6), 16);
  return `rgba(${r},${g},${b},${a})`;
}

function flattenRow(obj, prefix, out) {
  out = out || {};
  for (const k in obj) {
    if (k.startsWith("@")) continue;
    const v = obj[k];
    const key = prefix ? `${prefix}.${k}` : k;
    if (v && typeof v === "object" && !Array.isArray(v)) flattenRow(v, key, out);
    else if (Array.isArray(v)) out[key] = v.map((x) => (typeof x === "object" ? JSON.stringify(x) : x)).join("; ");
    else out[key] = v;
  }
  return out;
}

function toCSV(rows) {
  const flat = rows.map((r) => flattenRow(r));
  const cols = [];
  for (const r of flat) for (const k of Object.keys(r)) if (!cols.includes(k)) cols.push(k);
  const esc = (v) => {
    if (v === null || v === undefined) return "";
    const s = String(v);
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const lines = [cols.join(",")];
  for (const r of flat) lines.push(cols.map((c) => esc(r[c])).join(","));
  return lines.join("\r\n");
}

function downloadCSV(rows, name) {
  const csv = "\uFEFF" + toCSV(rows); // BOM so Excel reads UTF-8 cleanly
  triggerDownload(csv, (name || "graph-export") + ".csv", "text/csv;charset=utf-8;");
}

function triggerDownload(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportRows(format, rows, name) {
  const flat = rows.map((r) => flattenRow(r));
  const cols = [];
  for (const r of flat) for (const k of Object.keys(r)) if (!cols.includes(k)) cols.push(k);
  const fname = name || "graph-export";
  const cell = (v) => (v === null || v === undefined ? "" : String(v));
  const escHtml = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  if (format === "csv") { downloadCSV(rows, fname); return; }

  if (format === "xlsx") {
    // Minimal SpreadsheetML 2003 — opens in Excel, no library needed
    const xmlCell = (v) => `<Cell><Data ss:Type="String">${escHtml(cell(v))}</Data></Cell>`;
    const header = `<Row>${cols.map((c) => `<Cell><Data ss:Type="String">${escHtml(c)}</Data></Cell>`).join("")}</Row>`;
    const body = flat.map((r) => `<Row>${cols.map((c) => xmlCell(r[c])).join("")}</Row>`).join("");
    const xml = `<?xml version="1.0"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
<Worksheet ss:Name="Graph"><Table>${header}${body}</Table></Worksheet></Workbook>`;
    triggerDownload(xml, fname + ".xls", "application/vnd.ms-excel");
    return;
  }

  const tableHtml = `<table><thead><tr>${cols.map((c) => `<th>${escHtml(c)}</th>`).join("")}</tr></thead><tbody>${
    flat.map((r) => `<tr>${cols.map((c) => `<td>${escHtml(cell(r[c]))}</td>`).join("")}</tr>`).join("")
  }</tbody></table>`;
  const doc = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${escHtml(fname)}</title>
<style>body{font-family:system-ui,Segoe UI,sans-serif;margin:24px;color:#1a1a1a}h1{font-size:16px}
table{border-collapse:collapse;width:100%;font-size:12px}th,td{border:1px solid #ccc;padding:5px 8px;text-align:left}
th{background:#f0f0f0;font-weight:600}tr:nth-child(even){background:#fafafa}
.meta{color:#666;font-size:11px;margin-bottom:16px}</style></head>
<body><h1>${escHtml(fname)}</h1><div class="meta">${flat.length} rows · exported from Graph Builder · ${new Date().toLocaleString()}</div>${tableHtml}</body></html>`;

  if (format === "html") { triggerDownload(doc, fname + ".html", "text/html;charset=utf-8;"); return; }

  if (format === "pdf") {
    // Open print-ready HTML; user picks "Save as PDF" in the print dialog
    const w = window.open("", "_blank");
    if (!w) { alert("Allow pop-ups to export PDF, or use HTML export."); return; }
    w.document.write(doc);
    w.document.close();
    w.focus();
    setTimeout(() => w.print(), 400);
    return;
  }
}

function downloadPS1(text, name, title) {
  const header = `<#
  ${title || "Microsoft Graph query"}
  Generated by Graph Builder — ${new Date().toLocaleString()}
  Requires the Microsoft.Graph PowerShell SDK:  Install-Module Microsoft.Graph -Scope CurrentUser
#>

`;
  const blob = new Blob([header + text + "\n"], { type: "text/plain;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = (name || "graph-query") + ".ps1";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function Ps1Btn({ text, name, title }) {
  return (
    <button onClick={() => downloadPS1(text, name, title)} style={ghostBtn()} title="Download as a .ps1 script">
      Export .ps1
    </button>
  );
}

    if (!msalApp || !account) return "";
    const scopes = [scope ? `https://graph.microsoft.com/${scope}` : "https://graph.microsoft.com/.default"];

      const r = await msalApp.acquireTokenSilent({ scopes, account });
      setConsented((prev) => (scope && !prev.includes(scope) ? [...prev, scope] : prev));

      setConsented((prev) => (scope && !prev.includes(scope) ? [...prev, scope] : prev));
      return r.accessToken;

  // ── run ──
  async function run(uri, scopeOverride) {

    setNeededScopes([]);

        const peek = await r.clone().text();
        if (/unsupportedquery|sorting (is )?not supported|not supported for/i.test(peek)) {

            .replace(/(\?|&)\$orderby=[^&]*/i, (m, sep) => (sep === "?" ? "?" : ""))

        // Graph (and the Intune proxy) list acceptable scopes in the message on a 403 — extract them.
        // Match any dotted PascalCase permission, e.g. User.Read.All, Mail.ReadWrite,
        // DeviceManagementManagedDevices.PrivilegedOperations.All (not just Read/ReadWrite).
        const found = [...new Set(msg.match(/[A-Z][A-Za-z]+(?:\.[A-Z][A-Za-z]+)+/g) || [])]

        const tmpl = chainPath.trim().replace(/^\//, "");

        let skipped = 0;
        for (let i = 0; i < parents.length; i++) {
          const row = parents[i];

          // substitute every {placeholder} from the parent row
          let missing = false;
          const sub = tmpl.replace(/\{([^}]+)\}/g, (_, k) => {

        }
        setHistory((prev) => [{
          method, url, version, at: Date.now(), status: "chain",
          resourceId, objectId, customPath, chainPath, chainLimit,
          params: JSON.parse(JSON.stringify(params)),
        }, ...prev.filter((h) => !(h.url === url && h.method === method))].slice(0, 30));

  // follow @odata.nextLink repeatedly, accumulating all pages into the current result (capped for safety)
  async function loadAllPages() {
    if (!nextLink || running) return;
    setRunning(true); setError(null);
    const base = result || {};
    try {
      const bearer = await getBearer(queryScope);
      if (!bearer) throw new Error("Couldn't acquire a token — try signing in again.");
      const headers = { Authorization: `Bearer ${bearer}` };
      if (consistencyOn) headers["ConsistencyLevel"] = "eventual";
      customHeaders.forEach((h) => { if (h.key.trim()) headers[h.key.trim()] = h.value; });
      let link = nextLink;
      let acc = Array.isArray(base.value) ? [...base.value] : [];
      let pages = 0; const MAX_PAGES = 50;
      while (link && pages < MAX_PAGES) {
        const r = await fetch(link, { headers });
        if (r.status === 429) { await new Promise((res) => setTimeout(res, (parseInt(r.headers.get("Retry-After") || "2", 10)) * 1000)); continue; }
        let d = null; try { d = JSON.parse(await r.text()); } catch { d = {}; }
        if (!r.ok) throw new Error(d?.error?.message || `HTTP ${r.status}`);
        if (Array.isArray(d?.value)) acc = acc.concat(d.value);
        link = d?.["@odata.nextLink"] || null;
        pages++;
        setNextLink(link);
        setChainProgress(`${acc.length} rows`);
        setResult({ ...base, value: acc, "@graphbuilder.pages": `${acc.length} rows loaded across ${pages} extra page(s)${link ? " — more available" : ""}` });
        await new Promise((res) => setTimeout(res, 60)); // gentle pacing
      }
      if (link) setNotice(`Stopped after ${MAX_PAGES} pages (${acc.length} rows). Click "Load all pages" again to keep going.`);
    } catch (e) {
      setError(e.message);
    } finally {
      setRunning(false); setChainProgress(null);
    }
  }

  // ── reversible: swap the loaded write for its inverse (and keep a path back) ──
  function loadInverse() {

  // ── dashboards: fetch every tile's metric (deduped by path) and store per-tile results ──
  async function loadDashboard(which) {
    const cfg = DASHBOARDS[which];
    if (!cfg) return;
    if (!account) { setError("Sign in first — dashboards read live tenant data."); return; }
    setDashLoading(true);
    setDashData(Object.fromEntries(cfg.tiles.map((t) => [t.key, { status: "loading" }])));
    const uniq = {};
    cfg.tiles.forEach((t) => { const k = `${t.version}|${t.scope}|${t.path}`; if (!uniq[k]) uniq[k] = { scope: t.scope, version: t.version, path: t.path }; });
    const raw = {};
    await Promise.all(Object.entries(uniq).map(async ([k, u]) => {
      try {
        const bearer = await getBearer(u.scope);
        if (!bearer) { raw[k] = { ok: false, err: "no token" }; return; }
        const headers = { Authorization: `Bearer ${bearer}`, ConsistencyLevel: "eventual" };
        const r = await fetch(`https://graph.microsoft.com/${u.version}/${u.path}`, { headers });
        const txt = await r.text();
        let d = null; try { d = txt ? JSON.parse(txt) : {}; } catch { d = { raw: txt }; }
        raw[k] = r.ok ? { ok: true, d } : { ok: false, err: (d && d.error && d.error.message) || `HTTP ${r.status}` };
      } catch (e) { raw[k] = { ok: false, err: e.message }; }

    const out = {};
    cfg.tiles.forEach((t) => {
      const rr = raw[`${t.version}|${t.scope}|${t.path}`];
      if (!rr || !rr.ok) { out[t.key] = { status: "err", err: (rr && rr.err) || "failed" }; return; }
      try { const v = t.read(rr.d); out[t.key] = { status: "ok", value: v == null ? "—" : v }; }
      catch { out[t.key] = { status: "err", err: "couldn't read metric" }; }

  }

  // ── Assistant: execute a Graph query the model asked for. GET runs live (read-only);
  //    writes are never auto-run — they're staged in the builder for the user to review + Run. ──
  async function execGraphQuery(input) {
    const rid = input.resourceId || "custom";
    const r = rid === "custom" || !RESOURCES.find((x) => x.id === rid)
      ? { id: "custom", path: (input.customPath || rid || "me").replace(/^\//, "").split("?")[0], scope: "", dir: false, bools: [] }
      : RESOURCES.find((x) => x.id === rid);
    const params = Array.isArray(input.params) ? input.params : [];
    const method = (input.method || "GET").toUpperCase();
    const ver = input.version || "v1.0";
    const oid = (input.objectId || "").trim();
    const cons = needsConsistency(params, r);
    const q = buildQuery(params, r, cons);
    const appendId = oid && (rid !== "custom" || pathAcceptsAppendedId(r.path));
    const p = `${r.path}${appendId ? "/" + oid : ""}`;
    const url = `https://graph.microsoft.com/${ver}/${p}${oid && appendId ? "" : q}`;
    if (method !== "GET") {
      // stage the write in the builder — the user reviews and runs it behind the write-confirm dialog
      setMethod(method); setVersion(ver); setResourceId(rid);
      if (input.customPath != null) setCustomPath(input.customPath);
      setObjectId(oid);
      if (input.body != null) setBody(typeof input.body === "string" ? input.body : JSON.stringify(input.body, null, 2));
      setParams(params.map((pp, i) => ({ ...pp, id: Date.now() + i })));
      setEditing(null); setLoadedTemplate(null);
      return { staged: true, method, url, note: "WRITE staged in the query builder for the user to review and Run (close this chat to see it). It was NOT executed." };
    }
    if (!account) return { error: "User isn't signed in, so the query can't run. Ask them to sign in (top-right) first." };
    const base = r.scope || (SCOPE_BY_PREFIX.find(([pre]) => r.path.startsWith(pre)) || [])[1] || "User.Read";
    const bearer = await getBearer(base);
    if (!bearer) return { error: "Couldn't acquire a token." };
    const headers = { Authorization: `Bearer ${bearer}` };
    if (cons) headers["ConsistencyLevel"] = "eventual";
    const resp = await fetch(url, { method: "GET", headers });
    const text = await resp.text();
    let data = null; try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }
    if (!resp.ok) return { ok: false, status: resp.status, url, error: data?.error?.message || data?.Message || `HTTP ${resp.status}` };
    let rows = Array.isArray(data?.value) ? data.value : null;
    if (rows) {
      // auto-paginate so the model sees true counts (capped to keep tokens + time sane)
      let link = data["@odata.nextLink"]; let pages = 0;
      while (link && rows.length < 1000 && pages < 10) {
        const nr = await fetch(link, { method: "GET", headers });
        if (!nr.ok) break;
        let nd = null; try { nd = JSON.parse(await nr.text()); } catch { break; }
        if (Array.isArray(nd?.value)) rows = rows.concat(nd.value);
        link = nd?.["@odata.nextLink"] || null; pages++;
      }
      const trimmed = { ...data, value: rows.slice(0, 25), "@graphbuilder.returned": `${rows.length}${link ? "+" : ""} rows (showing ${Math.min(25, rows.length)})` };
      delete trimmed["@odata.nextLink"];
      return { ok: true, status: resp.status, url, data: trimmed };
    }
    return { ok: true, status: resp.status, url, data };
  }

          turns = [...turns, { role: "tool", results }];
          setAsstMsgs(turns);
          continue;
        }
        break;
      }
    } catch (e) {
      if (e.name === "AbortError") { setAsstMsgs([...turns, { role: "assistant", text: liveText || "_(stopped)_", calls: [] }]); }
      else setAsstError(e.message);
    }
    finally { setAsstLoading(false); asstAbortRef.current = null; }
  }

  // render assistant text with ``` fenced code blocks (copy button + monospace)
  function renderRich(text) {
    if (typeof text !== "string") return null;
    return text.split(/```/).map((seg, i) => {
      if (i % 2 === 1) {
        const nl = seg.indexOf("\n");
        const lang = nl > -1 ? seg.slice(0, nl).trim() : "";
        const code = (nl > -1 && /^[a-zA-Z0-9]+$/.test(lang) ? seg.slice(nl + 1) : seg).replace(/\n$/, "");
        return (
          <div key={i} style={{ position: "relative", margin: "8px 0" }}>
            <button onClick={() => navigator.clipboard && navigator.clipboard.writeText(code)} style={{ ...ghostBtn(C.resource), position: "absolute", top: 6, right: 6, fontSize: 10, padding: "2px 8px" }}>Copy</button>
            <pre style={{ background: C.bg, border: `1px solid ${C.line}`, borderRadius: 8, padding: "10px 12px", paddingTop: 26, overflowX: "auto", fontFamily: MONO, fontSize: 11.5, color: C.text, margin: 0 }}>{code}</pre>
          </div>
        );
      }
      return seg ? <span key={i} style={{ whiteSpace: "pre-wrap" }}>{seg}</span> : null;
    });
  }

  // result table columns
  const rows = result?.value || (result && !result.value ? [result] : []);
  const cols = useMemo(() => {
    if (result?.["@graphbuilder.chain"] && rows.length) {
      // chain output: columns come from the combined child rows, parent first
      return ["parent", ...Object.keys(rows[0]).filter((k) => k !== "parent" && !k.startsWith("@") && typeof rows[0][k] !== "object").slice(0, 4)];
    }
    const sel = params.find((p) => p.type === "select")?.props;
    if (sel?.length) return sel.slice(0, 6);
    if (!rows.length) return [];
    return Object.keys(rows[0]).filter((k) => !k.startsWith("@") && typeof rows[0][k] !== "object").slice(0, 5);
  }, [rows, params, result]);

  // ── editor panel content ──
  function EditorPanel() {
    if (editing === null) return null;
    const fullProps = (typeof window !== "undefined" && window.GRAPH_PROPS && window.GRAPH_PROPS[res.id]) || null;
    const propList = fullProps || (res.props.length ? res.props : discoveredProps);
    const close = (
      <button onClick={() => setEditing(null)} style={ghostBtn()}>

    if (editing === "custom") {
      const idx = getPathIndex(version);
      const q = customPath.trim().toLowerCase().replace(/^\//, "");
      const terms = q.split(/[\s/]+/).filter(Boolean);
      const matches =
        idx && terms.length
          ? idx.filter(([p]) => { const lp = p.toLowerCase(); return terms.every((t) => lp.includes(t)); }).slice(0, 30)
          : [];
      // top-level resource groups (first path segment), Graph Explorer style
      const topGroups = idx && !terms.length ? (() => {
        const seen = {};
        for (const [p] of idx) {
          const seg = p.split("/")[1];
          if (seg && !seg.startsWith("{")) seen[seg] = (seen[seg] || 0) + 1;
        }
        return Object.keys(seen).sort().map((g) => [g, seen[g]]);

                          <span className="text-xs font-bold whitespace-nowrap" style={{ fontFamily: MONO, color: C.param }}>
                            {m.split("").map((l) => METH_NAME[l][0] + METH_NAME[l].slice(1).toLowerCase()).join(" ")}

    if (editing === "chain") {

    }
    return null;
  }

                              <tr key={i} onClick={drill} style={{ borderTop: `1px solid ${C.line}`, cursor: rowId ? "pointer" : "default" }} title={rowId ? `Load this item (id: ${rowId})` : "No id on this row"} onMouseEnter={(e) => { if (rowId) e.currentTarget.style.background = C.panel; }} onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}>
                                <td className="px-1 text-center" style={{ color: rowId ? C.resource : C.line }}>{rowId ? "›" : ""}</td>
                                {cols.map((c) => { const v = c.includes("/") ? c.split("/").reduce((a, k) => a?.[k], r) : r[c]; return (<td key={c} className="px-2 py-1.5 whitespace-nowrap" style={{ color: C.text }}>{v === true ? "true" : v === false ? "false" : v == null ? <span style={{ color: C.dim }}>—</span> : String(v).slice(0, 48)}</td>); })}
                                {rowActs && (
                                  <td className="px-2 py-1 text-right" onClick={(e) => e.stopPropagation()}>
                                    <select value="" disabled={!rowId} title={rowId ? "Run a follow-up action on this row" : "No id on this row"}
                                      onChange={(e) => { const a = rowActs[+e.target.value]; if (a) { if (a.danger && !window.confirm(`Load "${a.label}" for this row?\n\nIt loads into the editor pre-filled — you still review and press Run before anything changes.`)) return; applyAction(a, rowId); } }}
                                      style={{ background: C.btnBg, color: rowId ? C.text : C.dim, border: `1px solid ${C.line}`, borderRadius: 7, fontSize: 11, padding: "2px 4px", fontFamily: MONO, cursor: rowId ? "pointer" : "default" }}>
                                      <option value="">⚡ Act…</option>
                                      {rowActs.map((a, ai) => (<option key={ai} value={ai}>{a.danger ? "⚠ " : ""}{a.label}</option>))}
                                    </select>
                                  </td>
                                )}
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                    </>
                    ); })()}
                  </>
                )}
                {nextLink && (<div className="mt-3 flex items-center gap-2"><button onClick={() => run(nextLink)} disabled={running} style={{ ...ghostBtn(C.ok), padding: "7px 14px" }}>{running ? "Loading…" : "Load next page →"}</button><button onClick={loadAllPages} disabled={running} style={{ ...ghostBtn(C.version), padding: "7px 14px" }} title="Follow every @odata.nextLink and combine all pages (capped at 50 pages per click)">{running ? "Loading…" : "Load all pages ⇊"}</button></div>)}
              </>
            ) : (
              <div className="flex flex-col items-center justify-center text-center py-12" style={{ color: C.dim }}>
                <div style={{ fontSize: 32, opacity: 0.4 }}>⬡</div>
                <p className="text-sm mt-2">Build a query above, then <b>Run</b> — results land here.</p>
              </div>
            )
          )}

          {resTab === "headers" && (
            respHeaders ? (
              <div className="overflow-x-auto" style={{ maxHeight: 360, overflowY: "auto" }}>
                <table className="w-full text-xs" style={{ fontFamily: MONO }}>
                  <tbody>
                    {Object.entries(respHeaders).map(([k, v]) => (
                      <tr key={k} style={{ borderTop: `1px solid ${C.line}` }}>
                        <td className="px-2 py-1.5 whitespace-nowrap align-top" style={{ color: C.param, fontWeight: 600 }}>{k}</td>
                        <td className="px-2 py-1.5 break-all" style={{ color: C.text }}>{v}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ) : (
              <p className="text-xs" style={{ color: C.dim }}>Run a query to see the response headers Graph returns.</p>
            )
          )}

          {resTab === "snippets" && (
            <div className="space-y-4">
              <div>
                <div className="flex items-center justify-between mb-1.5">
                  <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: C.param }}>PowerShell</span>
                  <div className="flex gap-1.5"><Ps1Btn text={ps} name={`graph-${res.path.split("/").pop() || "query"}`} title={`${method} ${url}`} /><CopyBtn text={ps} /></div>
                </div>
                <pre className="text-xs overflow-x-auto leading-relaxed m-0" style={{ fontFamily: MONO, color: C.text }}>{ps}</pre>
              </div>
              <div style={{ borderTop: `1px solid ${C.line}`, paddingTop: 14 }}>
                <div className="flex items-center justify-between mb-1.5">
                  <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: C.resource }}>Graph SDK cmdlet</span>
                  <div className="flex gap-1.5"><Ps1Btn text={SDK[res.id] ? sdkCmd : `Find-MgGraphCommand -Uri '/${path}' -Method ${method} -ApiVersion ${version}`} name={`graph-sdk-${res.path.split("/").pop() || "query"}`} title={`Graph SDK — ${method} /${path}`} /><CopyBtn text={SDK[res.id] ? sdkCmd : `Find-MgGraphCommand -Uri '/${path}' -Method ${method} -ApiVersion ${version}`} /></div>
                </div>
                {SDK[res.id] ? (
                  <pre className="text-xs overflow-x-auto leading-relaxed m-0" style={{ fontFamily: MONO, color: C.text }}>{sdkCmd}</pre>
                ) : (
                  <pre className="text-xs overflow-x-auto leading-relaxed m-0" style={{ fontFamily: MONO, color: C.text }}>{`Find-MgGraphCommand -Uri '/${path}' -Method ${method} -ApiVersion ${version} |\n    Select-Object Command, Permissions`}</pre>
                )}
              </div>
            </div>
          )}
        </Section>

        </div>{/* end body */}

        {signInModal && (
          <div
            onClick={() => setSignInModal(false)}
            style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 50 }}
          >
            <div
              onClick={(e) => e.stopPropagation()}
              style={{ background: C.glass, backdropFilter: "blur(24px)", WebkitBackdropFilter: "blur(24px)", border: `1px solid ${C.glassBorder}`, borderRadius: 18, maxWidth: 540, width: "100%", overflow: "hidden", boxShadow: `0 20px 60px rgba(0,0,0,0.3), ${C.glassHighlight}` }}
            >
              <div style={{ padding: "20px 22px 0" }}>
                <div className="flex items-start justify-between">
                  <div className="flex items-center gap-2.5">
                    <span style={{ fontSize: 18 }}>☁</span>
                    <h2 style={{ fontSize: 18, fontWeight: 700, color: C.text }}>Select cloud environment</h2>
                  </div>
                  <button onClick={() => setSignInModal(false)} style={{ color: C.dim, fontSize: 18, background: "none", border: "none", cursor: "pointer", lineHeight: 1 }}>×</button>
                </div>
                <p style={{ fontSize: 13, lineHeight: 1.6, color: C.dim, margin: "10px 0 0" }}>
                  This web app supports the Global (Commercial) cloud.
                </p>
              </div>

              <div style={{ padding: "16px 22px 0" }}>
                <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 10, padding: "14px 16px" }}>
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-2.5">
                      <span style={{ fontSize: 16 }}>🌐</span>
                      <span style={{ fontSize: 15, fontWeight: 700, color: C.text }}>Global (Commercial)</span>
                    </div>
                    <span style={{ fontSize: 11, fontWeight: 700, color: C.ok, background: hexA(C.ok, 0.12), border: `1px solid ${hexA(C.ok, 0.4)}`, borderRadius: 6, padding: "2px 9px" }}>Supported</span>
                  </div>
                  <p style={{ fontSize: 12.5, color: C.dim, margin: "8px 0 0" }}>Microsoft 365 commercial cloud for worldwide customers.</p>
                </div>
              </div>

              <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, padding: "18px 22px 20px" }}>
                <button onClick={() => setSignInModal(false)} style={{ ...ghostBtn(), padding: "9px 18px", fontSize: 13 }}>Cancel</button>
                <button
                  onClick={() => { setSignInModal(false); signIn(); }}
                  style={{ display: "flex", alignItems: "center", gap: 9, padding: "9px 18px", borderRadius: 8, fontSize: 13.5, fontWeight: 700, background: "#2F2F2F", color: "#fff", border: "none", cursor: "pointer" }}
                >
                  <svg width="15" height="15" viewBox="0 0 21 21" aria-hidden="true">
                    <rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/>
                    <rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/>
                  </svg>
                  Continue to sign in
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(GraphBlocks));

</script>
</body>
</html>
