function getPathIndex(version) {
  if (typeof window === "undefined" || !window.GRAPH_PATHS) return null;
  if (!window.__gpParsed) {
    const parse = (s) =>
      s.split("\n").map((l) => {
        const i = l.lastIndexOf("~");
        return [l.slice(0, i), l.slice(i + 1)];
      });
    window.__gpParsed = { v1: parse(window.GRAPH_PATHS.v1), beta: parse(window.GRAPH_PATHS.beta) };
  }
  return window.__gpParsed[version === "beta" ? "beta" : "v1"];
}

function clauseToOData(c, res) {
  const isBool = res?.bools?.includes(c.prop);
  const isNum = /^\d+$/.test(c.val) && !isBool;
  const v = isBool || isNum ? c.val : `'${(c.val || "").replace(/'/g, "''")}'`;
  if (c.op === "startswith" || c.op === "contains") return `${c.op}(${c.prop},${v})`;
  return `${c.prop} ${c.op} ${v}`;
}

function buildQuery(params, res, consistency) {
  const parts = [];
  for (const p of params) {
    if (p.type === "select" && p.props.length) parts.push(`$select=${p.props.join(",")}`);
    if (p.type === "filter" && p.clauses.some((c) => c.prop && c.val !== "")) {
      const f = p.clauses.filter((c) => c.prop && c.val !== "").map((c) => clauseToOData(c, res)).join(` ${p.join} `);
      if (f) parts.push(`$filter=${f}`);
    }
    if (p.type === "top" && p.value) parts.push(`$top=${p.value}`);
    if (p.type === "orderby" && p.prop) parts.push(`$orderby=${p.prop} ${p.dir}`);
    if (p.type === "count") parts.push(`$count=true`);
    if (p.type === "expand" && p.value) parts.push(`$expand=${p.value}`);
  }
  if (consistency && !parts.includes("$count=true")) parts.push("$count=true");
  return parts.length ? "?" + parts.join("&") : "";
}

function needsConsistency(params, res) {
  if (!res?.dir) return false;
  const f = params.find((p) => p.type === "filter");
  if (!f) return false;
  return f.clauses.some((c) => OPS.find((o) => o.id === c.op)?.adv);
}

function flattenRow(obj, prefix, out) {
  out = out || {};
  for (const k in obj) {
    if (k.startsWith("@")) continue;
    const v = obj[k];
    const key = prefix ? `${prefix}.${k}` : k;
    if (v && typeof v === "object" && !Array.isArray(v)) flattenRow(v, key, out);
    else if (Array.isArray(v)) out[key] = v.map((x) => (typeof x === "object" ? JSON.stringify(x) : x)).join("; ");
    else out[key] = v;
  }
  return out;
}

function toCSV(rows) {
  const flat = rows.map((r) => flattenRow(r));
  const cols = [];
  for (const r of flat) for (const k of Object.keys(r)) if (!cols.includes(k)) cols.push(k);
  const esc = (v) => {
    if (v === null || v === undefined) return "";
    const s = String(v);
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const lines = [cols.join(",")];
  for (const r of flat) lines.push(cols.map((c) => esc(r[c])).join(","));
  return lines.join("\r\n");
}

function downloadCSV(rows, name) {
  const csv = "\uFEFF" + toCSV(rows); // BOM so Excel reads UTF-8 cleanly
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = (name || "graph-export") + ".csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── main ─────────────────────────────────────────────────────
function GraphBlocks() {
  const [method, setMethod] = useState("GET");
  const [version, setVersion] = useState("beta");
  const [resourceId, setResourceId] = useState("managedDevices");
  const [objectId, setObjectId] = useState("");
  const [params, setParams] = useState([]);
  const [editing, setEditing] = useState(null); // 'method'|'version'|'resource'|param index
  const [autoConsistency, setAutoConsistency] = useState(true);
  const [body, setBody] = useState("{\n  \n}");
  const [running, setRunning] = useState(false);
  const [result, setResult] = useState(null);
  const [discoveredProps, setDiscoveredProps] = useState([]);
  const [error, setError] = useState(null);
  const [neededScopes, setNeededScopes] = useState([]);
  const [nextLink, setNextLink] = useState(null);
  const [showRaw, setShowRaw] = useState(false);
  const [learn, setLearn] = useState(true);
  const [theme, setTheme] = useState("dark");
  C = THEMES[theme];
  const CFG = (typeof window !== "undefined" && window.GRAPH_BLOCKS_CONFIG) || {};
  const [tenantId, setTenantId] = useState(CFG.tenantId || "");
  const [clientId, setClientId] = useState(CFG.clientId || "");
  const preconfigured = Boolean((CFG.clientId || "").trim());
  const [account, setAccount] = useState(null);
  const [msalApp, setMsalApp] = useState(null);
  const [showSetup, setShowSetup] = useState(false);
  const [selectedScopes, setSelectedScopes] = useState([]);
  const [consented, setConsented] = useState([]);
  const [customPath, setCustomPath] = useState("me/drive/root/children");

  const res =
    resourceId === "custom"
      ? { id: "custom", label: "Custom path", path: (customPath.trim().replace(/^\//, "").split("?")[0] || "me"), scope: "", dir: false, props: [], bools: [] }
      : RESOURCES.find((r) => r.id === resourceId);
  const consistencyNeeded = needsConsistency(params, res);
  const consistencyOn = consistencyNeeded && autoConsistency;

  const query = useMemo(() => buildQuery(params, res, consistencyOn), [params, res, consistencyOn]);
  const path = `${res.path}${objectId ? "/" + objectId.trim() : ""}`;
  const url = `https://graph.microsoft.com/${version}/${path}${objectId ? "" : query}`;

  const betaWarn = res.betaOnly && version === "v1.0";

  // resolve the least-privilege scope this query needs
  const SCOPE_BY_PREFIX = [
    ["deviceManagement/managedDevices", "DeviceManagementManagedDevices.Read.All"],
    ["deviceManagement/detectedApps", "DeviceManagementManagedDevices.Read.All"],
    ["deviceManagement/virtualEndpoint", "CloudPC.Read.All"],
    ["deviceManagement/windowsAutopilot", "DeviceManagementServiceConfig.Read.All"],
    ["deviceManagement/importedWindowsAutopilot", "DeviceManagementServiceConfig.Read.All"],
    ["deviceManagement/importedDeviceIdentities", "DeviceManagementServiceConfig.Read.All"],
    ["deviceManagement/deviceEnrollment", "DeviceManagementServiceConfig.Read.All"],
    ["deviceManagement/deviceHealthScripts", "DeviceManagementConfiguration.Read.All"],
    ["deviceManagement", "DeviceManagementConfiguration.Read.All"],
    ["deviceAppManagement", "DeviceManagementApps.Read.All"],
    ["identity/conditionalAccess", "Policy.Read.All"],
    ["identityProtection/riskyUsers", "IdentityRiskyUser.Read.All"],
    ["identityProtection/riskDetections", "IdentityRiskEvent.Read.All"],
    ["identityProtection", "IdentityRiskyUser.Read.All"],
    ["auditLogs", "AuditLog.Read.All"],
    ["security/secureScore", "SecurityEvents.Read.All"],
    ["security/incidents", "SecurityIncident.Read.All"],
    ["security", "SecurityAlert.Read.All"],
    ["applications", "Application.Read.All"],
    ["servicePrincipals", "Application.Read.All"],
    ["roleManagement", "RoleManagement.Read.Directory"],
    ["directoryRoles", "RoleManagement.Read.Directory"],
    ["subscribedSkus", "Organization.Read.All"],
    ["organization", "Organization.Read.All"],
    ["domains", "Domain.Read.All"],
    ["groups", "Group.Read.All"],
    ["devices", "Device.Read.All"],
    ["users", "User.Read.All"],
    ["me/messages", "Mail.Read"],
    ["me/mailFolders", "Mail.Read"],
    ["me/events", "Calendars.Read"],
    ["me/calendars", "Calendars.Read"],
    ["me/contacts", "Contacts.Read"],
    ["me/drive", "Files.Read"],
    ["me/todo", "Tasks.Read"],
    ["me/planner", "Tasks.Read"],
    ["me/joinedTeams", "Team.ReadBasic.All"],
    ["me/chats", "Chat.ReadBasic"],
    ["me/onenote", "Notes.Read"],
    ["me", "User.Read"],
  ];
  const queryScope = useMemo(() => {
    if (res.scope) return res.scope;
    const p = res.path.replace(/^\//, "");
    const hit = SCOPE_BY_PREFIX.find(([pre]) => p.startsWith(pre));
    return hit ? hit[1] : "User.Read";
  }, [res]);

  const ps = useMemo(() => {
    const lines = [res.scope ? `Connect-MgGraph -Scopes '${res.scope}'` : `Connect-MgGraph  # add -Scopes for this endpoint (Find-MgGraphCommand shows them)`];
    let call = `Invoke-MgGraphRequest -Method ${method} -Uri '${url}'`;
    if (consistencyOn) call += ` -Headers @{ ConsistencyLevel = 'eventual' }`;
    if (method === "POST" || method === "PATCH") call += ` -Body '${body.replace(/\n/g, " ")}' -ContentType 'application/json'`;
    lines.push(call + (method === "GET" && !objectId ? " |" : ""));
    if (method === "GET" && !objectId) lines.push("    Select-Object -ExpandProperty value");
    return lines.join("\n");
  }, [res, method, url, consistencyOn, body, objectId]);

  const sdkCmd = useMemo(() => {
    const m = SDK[res.id];
    if (!m) return "";
    const beta = version === "beta" ? "Beta" : "";
    const args = [];
    if (objectId) {
      args.push(`-${m.id} '${objectId.trim()}'`);
    } else {
      const f = params.find((p) => p.type === "filter");
      const fStr = f ? f.clauses.filter((c) => c.prop && c.val !== "").map((c) => clauseToOData(c, res)).join(` ${f.join} `) : "";
      if (fStr) args.push(`-Filter "${fStr}"`);
      const sel = params.find((p) => p.type === "select");
      if (sel?.props.length) args.push(`-Property ${sel.props.join(",")}`);
      const top = params.find((p) => p.type === "top");
      if (top?.value) args.push(`-Top ${top.value}`);
      const ob = params.find((p) => p.type === "orderby");
      if (ob?.prop) args.push(`-Sort '${ob.prop} ${ob.dir}'`);
      const ex = params.find((p) => p.type === "expand");
      if (ex?.value) args.push(`-ExpandProperty ${ex.value}`);
      if (params.some((p) => p.type === "count") || consistencyOn) args.push(`-CountVariable total`);
      if (consistencyOn) args.push(`-ConsistencyLevel eventual`);
    }
    if (method === "POST" || method === "PATCH") args.push(`-BodyParameter $body`);
    return [`${VERB[method]}-Mg${beta}${m.noun}`, ...args].join(" `\n    ");
  }, [res, version, objectId, params, consistencyOn, method]);

  const pathMeta = useMemo(() => {
    if (resourceId !== "custom") return null;
    const idx = getPathIndex(version);
    if (!idx) return null;
    const hit = idx.find(([p]) => p === "/" + res.path);
    return hit ? hit[1] : null;
  }, [resourceId, res.path, version]);

  // ── param mutators ──
  const addParam = (type) => {
    const base =
      type === "select" ? { type, props: [] }
      : type === "filter" ? { type, clauses: [{ prop: "", op: "eq", val: "" }], join: "and" }
      : type === "top" ? { type, value: "25" }
      : type === "orderby" ? { type, prop: "", dir: "asc" }
      : type === "expand" ? { type, value: "" }
      : { type };
    setParams((p) => [...p, base]);
    setEditing(params.length);
  };
  const updateParam = (i, patch) => setParams((p) => p.map((x, j) => (j === i ? { ...x, ...patch } : x)));
  const removeParam = (i) => {
    setParams((p) => p.filter((_, j) => j !== i));
    setEditing(null);
  };

  const paramValue = (p) => {
    if (p.type === "select") return p.props.length ? p.props.join(",").slice(0, 64) + (p.props.join(",").length > 64 ? "…" : "") : "pick…";
    if (p.type === "filter") {
      const c = p.clauses.filter((c) => c.prop);
      return c.length ? c.map((x) => `${x.prop} ${x.op} ${x.val || "?"}`).join(` ${p.join} `).slice(0, 64) : "build…";
    }
    if (p.type === "top") return p.value || "?";
    if (p.type === "orderby") return p.prop ? `${p.prop} ${p.dir}` : "pick…";
    if (p.type === "count") return "true";
    if (p.type === "expand") return p.value || "type…";
    return "";
  };

  // ── auth ──
  async function signIn() {
    setError(null);
    if (typeof window === "undefined" || !window.msal) {
      setError(
        window.__msalFailed
          ? "Couldn't load the Microsoft sign-in library from any CDN. Check the browser console (F12) for the blocked URL — if you're offline or a network filter is blocking it, you can download msal-browser.min.js next to this file and I'll show you how to point at it locally."
          : "Sign-in library is still loading — give it a second and tap again. (If this persists, it's blocked inside the chat sandbox; serve the file standalone with the PowerShell server.)"
      );
      return;
    }
    if (!clientId.trim()) {
      setError("No client ID configured yet — open graph-blocks.html in Notepad and paste your app registration's client ID into GRAPH_BLOCKS_CONFIG at the top, then refresh.");
      return;
    }
    try {
      const app = new window.msal.PublicClientApplication({
        auth: {
          clientId: clientId.trim(),
          authority: tenantId.trim()
            ? `https://login.microsoftonline.com/${tenantId.trim()}`
            : "https://login.microsoftonline.com/organizations",
          redirectUri: window.location.origin + window.location.pathname,
        },
        cache: { cacheLocation: "memoryStorage" },
      });
      if (app.initialize) await app.initialize();
      const r = await app.loginPopup({ scopes: ["openid", "profile", "offline_access"] });
      setMsalApp(app);
      setAccount(r.account);
    } catch (e) {
      setError(
        /popup|window/i.test(e.message || "")
          ? "Popup blocked — sign-in can't run inside the chat sandbox. Serve this file standalone (python -m http.server 8080) and open it in a browser."
          : e.message
      );
    }
  }

  function signOut() {
    setAccount(null);
    setMsalApp(null);
  }

  function adminConsentUrl() {
    const t = tenantId.trim() || "organizations";
    const chosen = selectedScopes.length ? selectedScopes : READ_SCOPES;
    return `https://login.microsoftonline.com/${t}/v2.0/adminconsent?client_id=${clientId.trim()}&scope=${encodeURIComponent(chosen.join(" "))}&redirect_uri=${encodeURIComponent(window.location.origin + window.location.pathname)}`;
  }

  async function getBearer(scope) {
    if (!msalApp || !account) return "";
    const scopes = [scope ? `https://graph.microsoft.com/${scope}` : "https://graph.microsoft.com/.default"];
    try {
      const r = await msalApp.acquireTokenSilent({ scopes, account });
      setConsented((prev) => (scope && !prev.includes(scope) ? [...prev, scope] : prev));
      return r.accessToken;
    } catch {
      // new scope → incremental consent prompt appears here automatically
      const r = await msalApp.acquireTokenPopup({ scopes, account });
      setConsented((prev) => (scope && !prev.includes(scope) ? [...prev, scope] : prev));
      return r.accessToken;
    }
  }

  // ── run ──
  async function run(uri, scopeOverride) {
    setError(null);
    if (!account) {
      setError("Sign in first — read-only consent takes one tap.");
      return;
    }
    if (method !== "GET" && !uri && !window.confirm(`This will send a real ${method} to your tenant. Continue?`)) return;
    setRunning(true);
    setNeededScopes([]);
    if (!uri) {
      setResult(null);
      setNextLink(null);
    }
    try {
      const bearer = await getBearer(scopeOverride || queryScope);
      if (!bearer) throw new Error("Couldn't acquire a token — try signing in again.");
      const headers = { Authorization: `Bearer ${bearer}` };
      if (consistencyOn) headers["ConsistencyLevel"] = "eventual";
      const opts = { method, headers };
      if ((method === "POST" || method === "PATCH") && !uri) {
        headers["Content-Type"] = "application/json";
        opts.body = body;
      }
      const r = await fetch(uri || url, opts);
      const text = await r.text();
      let data = null;
      try { data = text ? JSON.parse(text) : { status: r.status }; } catch { data = { raw: text }; }
      if (!r.ok) {
        const msg = data?.error?.message || data?.Message || `HTTP ${r.status}`;
        const code = data?.error?.code ? ` (${data.error.code})` : "";
        // Graph often lists acceptable scopes in the message on a 403 — extract them
        const found = (msg.match(/[A-Za-z][A-Za-z.]*\.(?:ReadWrite|Read)(?:\.All)?/g) || []);
        const reads = [...new Set(found)].filter((s) => /\.Read(\.All)?$/.test(s));
        setNeededScopes(reads.length ? reads : [...new Set(found)]);
        throw new Error(msg + code);
      }
      if (uri && result?.value && data?.value) {
        setResult({ ...data, value: [...result.value, ...data.value] });
      } else {
        setResult(data);
      }
      // learn the property names from the response shape (for custom paths with no hardcoded props)
      const sample = Array.isArray(data?.value) ? data.value[0] : data?.value ? data.value : data;
      if (sample && typeof sample === "object") {
        const keys = Object.keys(sample).filter((k) => !k.startsWith("@"));
        if (keys.length) setDiscoveredProps(keys);
      }
      setNextLink(data?.["@odata.nextLink"] || null);
    } catch (e) {
      setError(e.message === "Failed to fetch" ? "Request blocked or network error — your session may have expired (try signing out and back in), or the endpoint rejected the call." : e.message);
    } finally {
      setRunning(false);
    }
  }

  // result table columns
  const rows = result?.value || (result && !result.value ? [result] : []);
  const cols = useMemo(() => {
    const sel = params.find((p) => p.type === "select")?.props;
    if (sel?.length) return sel.slice(0, 6);
    if (!rows.length) return [];
    return Object.keys(rows[0]).filter((k) => !k.startsWith("@") && typeof rows[0][k] !== "object").slice(0, 5);
  }, [rows, params]);

  // ── editor panel content ──
  function EditorPanel() {
    if (editing === null) return null;
    const propList = res.props.length ? res.props : discoveredProps;
    const close = (
      <button onClick={() => setEditing(null)} className="px-2.5 py-1 rounded text-xs font-semibold" style={{ background: C.panel, color: C.dim, border: `1px solid ${C.line}` }}>
        Done
      </button>
    );
    if (editing === "custom") {
      const idx = getPathIndex(version);
      const q = customPath.trim().toLowerCase().replace(/^\//, "");
      const terms = q.split(/[\s/]+/).filter(Boolean);
      const matches =
        idx && terms.length
          ? idx.filter(([p]) => { const lp = p.toLowerCase(); return terms.every((t) => lp.includes(t)); }).slice(0, 30)
          : [];
      return (
        <Section title={idx ? `Search all ${idx.length.toLocaleString()} ${version} Graph paths` : "Custom Graph path"} accent={C.resource} right={close}>
          <input
            value={customPath}
            onChange={(e) => setCustomPath(e.target.value)}
            placeholder={idx ? "search all Graph paths, e.g. autopilot or users messages" : "e.g. me/drive/root/children"}
            className="w-full px-3 py-2 rounded-lg text-sm outline-none"
            style={{ background: C.panel, color: C.text, border: `1px solid ${C.line}`, fontFamily: MONO }}
          />
          {idx ? (
            <>
              <p className="text-xs mt-2" style={{ color: C.dim }}>
                Searching {idx.length.toLocaleString()} official {version} paths — type words to narrow, tap to use.
              </p>
              {matches.length > 0 && (
                <div className="mt-2 rounded-lg" style={{ border: `1px solid ${C.line}`, maxHeight: 280, overflowY: "auto" }}>
                  {matches.map(([p, m]) => (
                    <button
                      key={p}
                      onClick={() => setCustomPath(p.slice(1))}
                      className="w-full text-left px-3 py-2 flex items-center justify-between gap-2"
                      style={{ borderBottom: `1px solid ${C.line}`, background: "/" + res.path === p ? C.panel : "transparent" }}
                    >
                      <span className="text-xs break-all" style={{ fontFamily: MONO, color: C.text }}>{p}</span>
                      <span className="text-xs font-bold whitespace-nowrap" style={{ fontFamily: MONO, color: C.param }}>
                        {m.split("").map((l) => METH_NAME[l][0] + METH_NAME[l].slice(1).toLowerCase()).join(" ")}
                      </span>
                    </button>
                  ))}
                </div>
              )}
              {learn && <Tip>This is the complete Microsoft Graph surface, extracted from Microsoft's official OpenAPI specs (msgraph-metadata) — every endpoint that exists, including ones no portal exposes. Switch the version block to search beta vs v1.0.</Tip>}
            </>
          ) : (
            <>
              {learn && <Tip>{GOTCHAS.custom}</Tip>}
              <p className="text-xs mt-2" style={{ color: C.dim }}>
                Full-index search (27,000+ official Graph paths) activates when <span style={{ fontFamily: MONO, color: C.text }}>graph-paths.js</span> sits next to this file — it's the companion file generated alongside this app.
              </p>
            </>
          )}
        </Section>
      );
    }
    if (editing === "id")
      return (
        <Section title="Object ID — fetch a single item" accent={C.resource} right={close}>
          <input
            value={objectId}
            onChange={(e) => setObjectId(e.target.value)}
            placeholder="00000000-0000-…"
            className="w-full px-3 py-2 rounded-lg text-sm outline-none"
            style={{ background: C.panel, color: C.text, border: `1px solid ${C.line}`, fontFamily: MONO }}
          />
          {learn && SDK[res.id] && (
            <Tip>With an ID, the SDK call switches to the -{SDK[res.id].id} parameter — and query params no longer apply, since you're fetching one object instead of a collection.</Tip>
          )}
        </Section>
      );
    if (typeof editing === "number") {
      const p = params[editing];
      if (!p) return null;
      if (p.type === "select")
        return (
          <Section title="$select — pick columns" accent={C.param} right={close}>
            {propList.length ? (
              <div className="flex flex-wrap gap-2">
                {propList.map((prop) => (
                  <Chip
                    key={prop}
                    active={p.props.includes(prop)}
                    color={C.param}
                    onClick={() => updateParam(editing, { props: p.props.includes(prop) ? p.props.filter((x) => x !== prop) : [...p.props, prop] })}
                  >
                    {prop}
                  </Chip>
                ))}
              </div>
            ) : (
              <input
                value={p.props.join(",")}
                onChange={(e) => updateParam(editing, { props: e.target.value.split(",").map((x) => x.trim()).filter(Boolean) })}
                placeholder="comma-separated, e.g. id,displayName"
                className="w-full px-3 py-2 rounded-lg text-sm outline-none"
                style={{ background: C.panel, color: C.text, border: `1px solid ${C.line}`, fontFamily: MONO }}
              />
            )}
            {!res.props.length && !discoveredProps.length && (
              <p className="text-xs mt-2" style={{ color: C.dim }}>Run this query once and the columns from the response will appear here as buttons.</p>
            )}
            {!res.props.length && discoveredProps.length > 0 && (
              <p className="text-xs mt-2" style={{ color: C.resource }}>↑ Properties discovered from the last response.</p>
            )}
            {learn && <Tip>{TIPS.select}</Tip>}
          </Section>
        );
      if (p.type === "filter")
        return (
          <Section title="$filter — build clauses" accent={C.param} right={close}>
            {p.clauses.map((c, ci) => (
              <div key={ci} className="flex flex-wrap items-center gap-2 mb-2">
                {propList.length ? (
                  <select
                    value={c.prop}
                    onChange={(e) => updateParam(editing, { clauses: p.clauses.map((x, j) => (j === ci ? { ...x, prop: e.target.value } : x)) })}
                    className="px-2 py-2 rounded-lg text-sm"
                    style={{ background: C.panel, color: C.text, border: `1px solid ${C.line}`, fontFamily: MONO }}
                  >
                    <option value="">property…</option>
                    {propList.map((pr) => <option key={pr} value={pr}>{pr}</option>)}
                  </select>
                ) : (
                  <input
                    value={c.prop}
                    onChange={(e) => updateParam(editing, { clauses: p.clauses.map((x, j) => (j === ci ? { ...x, prop: e.target.value } : x)) })}
                    placeholder="property"
                    className="px-3 py-2 rounded-lg text-sm outline-none"
                    style={{ background: C.panel, color: C.text, border: `1px solid ${C.line}`, fontFamily: MONO, width: 130 }}
                  />
                )}
                <select
                  value={c.op}
                  onChange={(e) => updateParam(editing, { clauses: p.clauses.map((x, j) => (j === ci ? { ...x, op: e.target.value } : x)) })}
                  className="px-2 py-2 rounded-lg text-sm"
                  style={{ background: C.panel, color: C.text, border: `1px solid ${C.line}` }}
                >
                  {OPS.map((o) => <option key={o.id} value={o.id}>{o.label}</option>)}
                </select>
                {res.bools.includes(c.prop) ? (
                  <select
                    value={c.val}
                    onChange={(e) => updateParam(editing, { clauses: p.clauses.map((x, j) => (j === ci ? { ...x, val: e.target.value } : x)) })}
                    className="px-2 py-2 rounded-lg text-sm"
                    style={{ background: C.panel, color: C.text, border: `1px solid ${C.line}`, fontFamily: MONO }}
                  >
                    <option value="">value…</option>
                    <option value="true">true</option>
                    <option value="false">false</option>
                  </select>
                ) : (
                  <input
                    value={c.val}
                    onChange={(e) => updateParam(editing, { clauses: p.clauses.map((x, j) => (j === ci ? { ...x, val: e.target.value } : x)) })}
                    placeholder="value"
                    className="px-3 py-2 rounded-lg text-sm flex-1 outline-none"
                    style={{ background: C.panel, color: C.text, border: `1px solid ${C.line}`, fontFamily: MONO }}
                  />
                )}
                {p.clauses.length > 1 && (
                  <button onClick={() => updateParam(editing, { clauses: p.clauses.filter((_, j) => j !== ci) })} className="w-7 h-7 rounded-full text-sm" style={{ background: C.panel, color: C.dim, border: `1px solid ${C.line}` }}>×</button>
                )}
              </div>
            ))}
            <div className="flex items-center gap-2 mt-1">
              <button
                onClick={() => updateParam(editing, { clauses: [...p.clauses, { prop: "", op: "eq", val: "" }] })}
                className="px-3 py-1.5 rounded-md text-sm font-semibold"
                style={{ background: C.panel, color: C.param, border: `1px solid ${C.line}` }}
              >
                + clause
              </button>
              {p.clauses.length > 1 && (
                <>
                  <span className="text-xs" style={{ color: C.dim }}>join with</span>
                  <Chip active={p.join === "and"} color={C.param} onClick={() => updateParam(editing, { join: "and" })}>and</Chip>
                  <Chip active={p.join === "or"} color={C.param} onClick={() => updateParam(editing, { join: "or" })}>or</Chip>
                </>
              )}
            </div>
            {learn && <Tip>{TIPS.filter}</Tip>}
          </Section>
        );
      if (p.type === "top")
        return (
          <Section title="$top — limit results" accent={C.param} right={close}>
            <input
              type="number" min="1" max="999"
              value={p.value}
              onChange={(e) => updateParam(editing, { value: e.target.value })}
              className="w-32 px-3 py-2 rounded-lg text-sm outline-none"
              style={{ background: C.panel, color: C.text, border: `1px solid ${C.line}`, fontFamily: MONO }}
            />
            {learn && <Tip>{TIPS.top}</Tip>}
          </Section>
        );
      if (p.type === "orderby")
        return (
          <Section title="$orderby — sort" accent={C.param} right={close}>
            <div className="flex flex-wrap items-center gap-2">
              {propList.length ? (
                <select
                  value={p.prop}
                  onChange={(e) => updateParam(editing, { prop: e.target.value })}
                  className="px-2 py-2 rounded-lg text-sm"
                  style={{ background: C.panel, color: C.text, border: `1px solid ${C.line}`, fontFamily: MONO }}
                >
                  <option value="">property…</option>
                  {propList.map((pr) => <option key={pr} value={pr}>{pr}</option>)}
                </select>
              ) : (
                <input
                  value={p.prop}
                  onChange={(e) => updateParam(editing, { prop: e.target.value })}
                  placeholder="property"
                  className="px-3 py-2 rounded-lg text-sm outline-none"
                  style={{ background: C.panel, color: C.text, border: `1px solid ${C.line}`, fontFamily: MONO, width: 130 }}
                />
              )}
              <Chip active={p.dir === "asc"} color={C.param} onClick={() => updateParam(editing, { dir: "asc" })}>asc</Chip>
              <Chip active={p.dir === "desc"} color={C.param} onClick={() => updateParam(editing, { dir: "desc" })}>desc</Chip>
            </div>
            {learn ? <Tip>{TIPS.orderby}</Tip> : <p className="text-xs mt-2" style={{ color: C.dim }}>Heads up: many Intune endpoints reject $orderby on most properties.</p>}
          </Section>
        );
      if (p.type === "expand")
        return (
          <Section title="$expand — related data" accent={C.param} right={close}>
            <select
              value={p.value}
              onChange={(e) => updateParam(editing, { value: e.target.value })}
              className="px-3 py-2 rounded-lg text-sm"
              style={{ background: C.panel, color: C.text, border: `1px solid ${C.line}`, fontFamily: MONO }}
            >
              <option value="">choose relationship…</option>
              {(EXPANDS[res.id] || []).map((x) => (
                <option key={x} value={x}>{x}</option>
              ))}
            </select>
            {learn && <Tip>{TIPS.expand}</Tip>}
          </Section>
        );
      if (p.type === "count")
        return (
          <Section title="$count" accent={C.param} right={close}>
            <p className="text-sm" style={{ color: C.dim }}>Adds <span style={{ fontFamily: MONO, color: C.text }}>$count=true</span> — the total appears as <span style={{ fontFamily: MONO, color: C.text }}>@odata.count</span> in the response.</p>
            {learn && <Tip>{TIPS.count}</Tip>}
          </Section>
        );
    }
    return null;
  }

  return (
    <div className="min-h-screen pb-16" style={{ background: C.bgGradient, color: C.text, fontFamily: "system-ui, -apple-system, 'Segoe UI', sans-serif" }}>
      <style>{`
        select option, select optgroup {
          background-color: ${C.surface};
          color: ${C.text};
        }
        select optgroup { font-style: normal; font-weight: 700; color: ${C.dim}; }
      `}</style>
      <div className="mx-auto px-6 pt-6" style={{ maxWidth: 1600 }}>

        {/* header */}
        <div className="flex items-end justify-between mb-4">
          <div>
            <h1 className="text-2xl font-extrabold tracking-tight">
              Graph<span style={{ color: C.resource }}> Builder</span>
            </h1>
            <p className="text-sm" style={{ color: C.dim }}>Snap blocks together. Get a valid Graph query.</p>
          </div>
          <div className="flex items-center gap-2 mb-1">
            <button
              onClick={() => setTheme(theme === "dark" ? "light" : "dark")}
              title="Toggle light / dark mode"
              className="px-2.5 py-1.5 rounded-md text-xs font-bold transition-transform"
              style={{ background: "transparent", color: C.dim, border: `1px solid ${C.line}` }}
            >
              {theme === "dark" ? "☀️" : "🌙"}
            </button>
            <button
              onClick={() => setLearn(!learn)}
              className="px-3 py-1.5 rounded-md text-xs font-bold transition-transform"
              style={{ background: learn ? C.param : "transparent", color: learn ? C.ink : C.dim, border: `1px solid ${learn ? C.param : C.line}` }}
            >
              💡 Learn mode {learn ? "on" : "off"}
            </button>
          </div>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-16">
        <div className="space-y-4">

        {/* canvas */}
        <Section title="Your query" accent={C.resource}>
          <div className="flex flex-wrap items-center pb-2 pt-1" style={{ rowGap: 10 }}>
            <Block
              first color={C.method} label="method" value={method}
              options={["GET", "POST", "PATCH", "DELETE"].map((m) => ({ v: m, l: m }))}
              selected={method} onSelect={setMethod}
            />
            <Block
              color={C.version} label="version" value={version}
              options={[{ v: "v1.0", l: "v1.0" }, { v: "beta", l: "beta" }]}
              selected={version} onSelect={setVersion}
            />
            <Block
              color={C.resource} label="resource"
              value={"/" + (res.path.length > 40 ? "…" + res.path.slice(-38) : res.path)}
              options={[
                ...(getPathIndex(version)
                  ? [{ group: `All Microsoft Graph — ${getPathIndex(version).length.toLocaleString()} ${version} paths`, items: [{ v: "custom", l: "🔍 Search every Graph path…" }] }]
                  : []),
                ...CATEGORIES.map((c) => ({
                  group: c.name,
                  items: c.ids.map((id) => {
                    const r = RESOURCES.find((x) => x.id === id);
                    return { v: id, l: r.label + (r.betaOnly ? " (β)" : "") };
                  }),
                })),
                ...(getPathIndex(version) ? [] : [{ group: "Anything else", items: [{ v: "custom", l: "Custom path…" }] }]),
              ]}
              selected={resourceId}
              onSelect={(id) => {
                setResourceId(id); setParams([]); setObjectId(""); setDiscoveredProps([]);
                if (id === "custom") {
                  setEditing("custom");
                } else {
                  setEditing(null);
                  const r = RESOURCES.find((x) => x.id === id);
                  if (r.betaOnly) setVersion("beta");
                }
              }}
            />
            {(objectId !== "" || editing === "id") && (
              <Block
                color={C.resource} label="id"
                value={objectId ? objectId.slice(0, 24) + (objectId.length > 24 ? "…" : "") : "type…"}
                onClick={() => setEditing("id")}
                onRemove={() => { setObjectId(""); if (editing === "id") setEditing(null); }}
              />
            )}
            {params.map((p, i) => (
              <Block key={i} color={C.param} label={"$" + p.type} value={paramValue(p)} onClick={() => setEditing(i)} onRemove={() => removeParam(i)} />
            ))}
            {consistencyOn && <Block color={C.header} label="header" value="ConsistencyLevel" onClick={() => setAutoConsistency(false)} />}
          </div>

          {/* add params */}
          {!objectId && (
            <div className="flex flex-wrap gap-2 mt-2 pt-3" style={{ borderTop: `1px dashed ${C.line}` }}>
              {editing !== "id" && !res.singleton && (
                <button
                  onClick={() => setEditing("id")}
                  className="px-3 py-1.5 rounded-md text-sm font-semibold transition-transform"
                  style={{ background: "transparent", color: C.resource, border: `1px dashed ${C.resource}66`, fontFamily: MONO }}
                  title="Fetch one object by ID"
                >
                  + /{"{id}"}
                </button>
              )}
              {PARAM_TYPES.filter((t) => !params.some((p) => p.type === t.id) && (t.id !== "expand" || EXPANDS[res.id]?.length)).map((t) => (
                <button
                  key={t.id}
                  onClick={() => addParam(t.id)}
                  className="px-3 py-1.5 rounded-md text-sm font-semibold transition-transform"
                  style={{ background: "transparent", color: C.param, border: `1px dashed ${C.param}66`, fontFamily: MONO }}
                  title={t.hint}
                >
                  + {t.label}
                </button>
              ))}
            </div>
          )}

          {/* hints */}
          {betaWarn && (
            <p className="text-xs mt-3 px-3 py-2 rounded-lg" style={{ background: "#F8717115", color: C.danger }}>
              {res.label} only exists in <b>beta</b> — switch the version block or this will 404.
            </p>
          )}
          {consistencyNeeded && (
            <p className="text-xs mt-3 px-3 py-2 rounded-lg" style={{ background: "#F472B615", color: C.header }}>
              Advanced filter on a directory resource: <span style={{ fontFamily: MONO }}>ConsistencyLevel: eventual</span> + <span style={{ fontFamily: MONO }}>$count=true</span> {autoConsistency ? "added automatically." : "required — "}
              {!autoConsistency && <button className="underline font-semibold" onClick={() => setAutoConsistency(true)}>re-enable</button>}
            </p>
          )}
          {pathMeta && !pathMeta.includes(METH_LETTER[method]) && (
            <p className="text-xs mt-3 px-3 py-2 rounded-lg" style={{ background: "#F8717115", color: C.danger }}>
              This path only supports: <b>{pathMeta.split("").map((l) => METH_NAME[l]).join(", ")}</b> — switch the method block.
            </p>
          )}
          {resourceId === "custom" && res.path.includes("{") && (
            <p className="text-xs mt-3 px-3 py-2 rounded-lg" style={{ background: "#F0A04B15", color: C.method }}>
              Replace the <span style={{ fontFamily: MONO }}>{"{placeholders}"}</span> in the path with real IDs before running.
            </p>
          )}
          {learn && GOTCHAS[res.id] && <Tip>{GOTCHAS[res.id]}</Tip>}
        </Section>

        {/* block editors */}
        {method !== "GET" && (
          <p className="text-xs px-3 py-2 rounded-lg" style={{ background: "#F8717115", color: C.danger }}>
            {method} sends real changes to your tenant when you hit Run.
          </p>
        )}
        {EditorPanel()}

        {/* run */}
        <Section
          title="Run it"
          accent={C.ok}
          right={account ? <button onClick={signOut} className="text-xs font-semibold" style={{ color: C.dim }}>Sign out</button> : null}
        >
          {account ? (
            <>
              <div className="flex items-center mb-2 px-3 py-2 rounded-lg" style={{ background: C.panel, border: `1px solid ${C.line}` }}>
                <span className="text-sm" style={{ fontFamily: MONO, color: C.ok }}>● {account.username}</span>
              </div>
              <div className="px-3 py-2 rounded-lg mb-1" style={{ background: C.panel, border: `1px solid ${C.line}` }}>
                <div className="text-xs font-bold uppercase tracking-wide mb-1" style={{ color: C.dim, fontSize: 10 }}>This query needs</div>
                <div className="flex items-center gap-2">
                  <span className="w-2 h-2 rounded-full" style={{ background: consented.includes(queryScope) ? C.ok : C.method }} />
                  <span className="text-sm font-semibold" style={{ fontFamily: MONO, color: C.text }}>{queryScope}</span>
                  <span className="text-xs" style={{ color: consented.includes(queryScope) ? C.ok : C.dim }}>
                    {consented.includes(queryScope) ? "consented" : "you'll be asked to consent on Run"}
                  </span>
                </div>
              </div>
              {learn && <Tip>Least-privilege in action: signing in granted nothing but your identity. Each query asks only for the one scope it needs, the first time you run it — exactly how Graph Explorer does incremental consent. Admin-gated scopes (most DeviceManagement/Directory) will need a global admin to approve.</Tip>}
            </>
          ) : (
            <>
                {!preconfigured && (
                  <div className="mb-3 px-3 py-2.5 rounded-lg text-xs leading-relaxed" style={{ background: "#F0A04B12", color: C.method, border: `1px solid ${C.method}44` }}>
                    <b>One-time setup needed:</b> run <span style={{ fontFamily: MONO }}>Setup-GraphBuilder.ps1</span> as an admin (creates the app registration and writes its client ID into this file), then refresh.
                  </div>
                )}
                <button
                  onClick={signIn}
                  className="w-full py-2 rounded-lg font-bold text-sm transition-transform"
                  style={{ background: C.version, color: C.ink }}
                >
                  Sign in with Microsoft
                </button>
                <p className="text-xs mt-2" style={{ color: C.dim }}>
                  Sign-in grants only your identity. Each query then asks for just the permission it needs, when you run it.
                </p>
                <button
                  onClick={() => {
                    if (!clientId.trim()) { setError("No client ID configured yet — see the setup note above."); return; }
                    window.open(adminConsentUrl(), "_blank");
                  }}
                  className="w-full py-2 rounded-xl font-semibold text-sm mt-2 transition-transform"
                  style={{ background: "transparent", color: C.header, border: `1px solid ${C.header}55` }}
                >
                  {selectedScopes.length
                    ? `Admin: pre-consent ${selectedScopes.length} selected scope${selectedScopes.length > 1 ? "s" : ""} org-wide`
                    : "Admin: pre-consent all read-only scopes org-wide"}
                </button>
                <div className="mt-3">
                  <div className="text-xs font-bold uppercase tracking-wide mb-1.5" style={{ color: C.dim, fontSize: 10 }}>
                    Or pick specific scopes {selectedScopes.length > 0 && `(${selectedScopes.length})`}
                  </div>
                  <select
                    value=""
                    onChange={(e) => {
                      const v = e.target.value;
                      if (v && !selectedScopes.includes(v)) setSelectedScopes([...selectedScopes, v]);
                    }}
                    className="w-full px-3 py-2 rounded-lg text-sm"
                    style={{ background: C.glass, color: C.text, border: `1px solid ${C.glassBorder}`, fontFamily: MONO }}
                  >
                    <option value="">add a scope…</option>
                    {READ_SCOPES.filter((s) => !selectedScopes.includes(s)).map((s) => (
                      <option key={s} value={s}>{s}</option>
                    ))}
                  </select>
                  {selectedScopes.length > 0 && (
                    <div className="flex flex-wrap gap-1.5 mt-2">
                      {selectedScopes.map((s) => (
                        <span key={s} className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs" style={{ background: hexA(C.resource, 0.18), color: C.resource, border: `1px solid ${hexA(C.resource, 0.5)}`, fontFamily: MONO }}>
                          {s}
                          <button onClick={() => setSelectedScopes(selectedScopes.filter((x) => x !== s))} style={{ color: C.resource, fontWeight: 700 }}>×</button>
                        </span>
                      ))}
                      <button onClick={() => setSelectedScopes([])} className="text-xs underline" style={{ color: C.dim }}>clear</button>
                    </div>
                  )}
                  <p className="text-xs mt-1.5" style={{ color: C.dim }}>
                    Leave empty to let each query request its own scope on Run. Pick scopes here only if you want to pre-consent a known set.
                  </p>
                </div>
            </>
          )}
          <button
            onClick={() => run()}
            disabled={running || betaWarn || !account}
            className="w-full py-2 rounded-lg font-bold text-sm mt-3 transition-transform"
            style={{ background: method === "GET" ? C.ok : C.danger, color: C.ink, opacity: running || betaWarn || !account ? 0.5 : 1 }}
          >
            {running ? "Running…" : !account ? "Sign in to run" : `Run ${method}`}
          </button>
          {error && (
            <p className="text-sm mt-3 px-3 py-2 rounded-lg" style={{ background: "#F8717115", color: C.danger }}>{error}</p>
          )}
          {neededScopes.length > 0 && account && (
            <div className="mt-2 px-3 py-2.5 rounded-lg" style={{ background: "#F0A04B12", border: `1px solid ${C.method}44` }}>
              <p className="text-xs mb-2" style={{ color: C.method }}>
                Graph wants a different permission than was guessed. Consent to the correct one and re-run:
              </p>
              <div className="flex flex-col gap-1.5">
                {neededScopes.slice(0, 4).map((s) => (
                  <button
                    key={s}
                    onClick={() => run(undefined, s)}
                    className="w-full py-1.5 rounded-md text-xs font-bold transition-transform"
                    style={{ background: C.method, color: C.ink, fontFamily: MONO }}
                  >
                    Consent &amp; run with {s}
                  </button>
                ))}
              </div>
              <p className="text-xs mt-2" style={{ color: C.dim }}>
                Admin-gated scopes need a global admin to approve the prompt.
              </p>
            </div>
          )}
        </Section>

        {/* body editor for write methods */}
        {(method === "POST" || method === "PATCH") && (
          <Section title="Request body (JSON)" accent={C.danger}>
            <textarea
              value={body}
              onChange={(e) => setBody(e.target.value)}
              rows={5}
              className="w-full px-3 py-2 rounded-lg text-sm outline-none"
              style={{ background: C.panel, color: C.text, border: `1px solid ${C.line}`, fontFamily: MONO }}
            />
          </Section>
        )}

        {/* output */}
        <Section title="Request URL" accent={C.version} right={<CopyBtn text={url} />}>
          <code className="block text-sm break-all leading-relaxed" style={{ fontFamily: MONO, color: C.resource }}>{url}</code>
        </Section>

        <Section title="PowerShell" accent={C.param} right={<CopyBtn text={ps} />}>
          <pre className="text-xs overflow-x-auto leading-relaxed m-0" style={{ fontFamily: MONO, color: C.text }}>{ps}</pre>
        </Section>

        <Section title="Graph SDK equivalent" accent={C.resource} right={<CopyBtn text={SDK[res.id] ? sdkCmd : `Find-MgGraphCommand -Uri '/${path}' -Method ${method} -ApiVersion ${version}`} />}>
          {SDK[res.id] ? (
            <>
              <pre className="text-xs overflow-x-auto leading-relaxed m-0" style={{ fontFamily: MONO, color: C.text }}>{sdkCmd}</pre>
              {learn && <Tip>{TIPS.sdk}</Tip>}
            </>
          ) : (
            <>
              <pre className="text-xs overflow-x-auto leading-relaxed m-0" style={{ fontFamily: MONO, color: C.text }}>{`Find-MgGraphCommand -Uri '/${path}' -Method ${method} -ApiVersion ${version} |\n    Select-Object Command, Permissions`}</pre>
              {learn && <Tip>No hardcoded mapping for this endpoint — but Find-MgGraphCommand looks up the SDK cmdlet (and required permissions) for any Graph URL. It's the reverse Rosetta Stone, and worth knowing even when this tool does have the answer.</Tip>}
            </>
          )}
        </Section>

        </div>{/* end left column */}

        {/* right column: results */}
        <div className="space-y-4 lg:sticky lg:top-4 lg:self-start">
        {result ? (
          <Section
            title={`Results${result["@odata.count"] != null ? ` · ${result["@odata.count"]} total` : rows.length ? ` · ${rows.length} shown` : ""}`}
            accent={C.ok}
            right={
              <div className="flex gap-1.5">
                <button
                  onClick={() => downloadCSV(rows, `graph-${res.path.split("/").pop()}`)}
                  disabled={!rows.length}
                  className="px-2.5 py-1 rounded text-xs font-semibold"
                  style={{ background: C.panel, color: rows.length ? C.ok : C.dim, border: `1px solid ${C.line}`, opacity: rows.length ? 1 : 0.5 }}
                >
                  Export CSV
                </button>
                <button onClick={() => setShowRaw(!showRaw)} className="px-2.5 py-1 rounded text-xs font-semibold" style={{ background: C.panel, color: C.dim, border: `1px solid ${C.line}` }}>
                  {showRaw ? "Table" : "Raw JSON"}
                </button>
              </div>
            }
          >
            {showRaw || !cols.length ? (
              <pre className="text-xs overflow-x-auto leading-relaxed m-0" style={{ fontFamily: MONO, color: C.text, maxHeight: 400, overflowY: "auto" }}>
                {JSON.stringify(result, null, 2)}
              </pre>
            ) : (
              <>
              {rows.length > 1 && rows.some((r) => r.id) && (
                <p className="text-xs mb-2" style={{ color: C.dim }}>
                  Click any row to load just that item by its id.
                </p>
              )}
              <div className="overflow-x-auto" style={{ maxHeight: 420, overflowY: "auto" }}>
                <table className="w-full text-xs" style={{ fontFamily: MONO }}>
                  <thead>
                    <tr>
                      <th className="sticky top-0" style={{ background: C.surface, width: 24 }} />
                      {cols.map((c) => (
                        <th key={c} className="text-left px-2 py-1.5 font-bold whitespace-nowrap sticky top-0" style={{ color: C.param, background: C.surface }}>{c}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map((r, i) => {
                      const rowId = r.id || r[Object.keys(r).find((k) => /Id$/.test(k) && typeof r[k] === "string")];
                      const drill = () => {
                        if (!rowId) return;
                        setResourceId(resourceId);   // keep current resource
                        setObjectId(String(rowId));
                        setParams([]);
                        setEditing(null);
                        setTimeout(() => run(), 0);  // re-run as single-object GET
                      };
                      return (
                        <tr
                          key={i}
                          onClick={drill}
                          style={{ borderTop: `1px solid ${C.line}`, cursor: rowId ? "pointer" : "default" }}
                          title={rowId ? `Load this item (id: ${rowId})` : "No id on this row to drill into"}
                          onMouseEnter={(e) => { if (rowId) e.currentTarget.style.background = C.panel; }}
                          onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
                        >
                          <td className="px-1 text-center" style={{ color: rowId ? C.resource : C.line }}>{rowId ? "›" : ""}</td>
                          {cols.map((c) => {
                            const v = c.includes("/") ? c.split("/").reduce((a, k) => a?.[k], r) : r[c];
                            return (
                              <td key={c} className="px-2 py-1.5 whitespace-nowrap" style={{ color: C.text }}>
                                {v === true ? "true" : v === false ? "false" : v == null ? <span style={{ color: C.dim }}>—</span> : String(v).slice(0, 48)}
                              </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              </>
            )}
            {nextLink && (
              <>
                <button
                  onClick={() => run(nextLink)}
                  disabled={running}
                  className="mt-3 px-4 py-2 rounded-lg text-sm font-bold"
                  style={{ background: C.panel, color: C.ok, border: `1px solid ${C.line}` }}
                >
                  {running ? "Loading…" : "Load next page →"}
                </button>
                {learn && <Tip>{TIPS.paging}</Tip>}
              </>
            )}
          </Section>
        ) : (
          <Section title="Results" accent={C.dim}>
            <div className="flex flex-col items-center justify-center text-center py-12" style={{ color: C.dim }}>
              <div style={{ fontSize: 32, opacity: 0.4 }}>⬡</div>
              <p className="text-sm mt-2">Build a query on the left, then <b>Run</b> — results land here.</p>
            </div>
          </Section>
        )}
        </div>{/* end right column */}
        </div>{/* end grid */}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(GraphBlocks));

</script>
</body>
</html>
