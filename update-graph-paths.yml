name: Update Graph paths index

# Rebuilds graph-paths.js from Microsoft's official OpenAPI specs so new
# Graph endpoints appear (and deprecated ones disappear) automatically.
# A push from this workflow also triggers the normal Pages deploy.

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday 06:00 UTC
  workflow_dispatch: {}    # ...and on demand from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Regenerate graph-paths.js from Microsoft specs
        run: python3 generate-graph-paths.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet graph-paths.js; then
            echo "No Graph API changes this week — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graph-paths.js
          git commit -m "chore: refresh Graph path index from msgraph-metadata"
          git push
